name: GitForgeOps PR Review

on:
  pull_request:
    paths:
      - 'resources/**'
      - 'overlays/**'

jobs:
  review:
    # Only run the container-based job when an image tag is explicitly
    # configured. Forks that haven't set it fall through to
    # `review-native` and pay the native-build cost instead of failing
    # on `docker pull`.
    #
    # The image defaults to the upstream-published
    # `ferrumedge/ferrum-edge-git-forge-ops`; override
    # `vars.GITFORGEOPS_IMAGE` to point at your own fork's image.
    if: vars.GITFORGEOPS_IMAGE_TAG != ''
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.GITFORGEOPS_IMAGE || 'ferrumedge/ferrum-edge-git-forge-ops' }}:${{ vars.GITFORGEOPS_IMAGE_TAG }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate
        run: gitforgeops validate --format github-annotations
        env:
          FERRUM_OVERLAY: ${{ vars.FERRUM_OVERLAY }}
          FERRUM_NAMESPACE: ${{ vars.FERRUM_NAMESPACE }}

  review-native:
    if: vars.GITFORGEOPS_IMAGE_TAG == ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download ferrum-edge binary
        run: |
          VERSION="${{ vars.FERRUM_EDGE_VERSION || 'latest' }}"
          # Use the direct-tag URL (`/releases/download/<tag>/`) rather
          # than `/releases/latest/download/`, which only resolves to the
          # most recent non-prerelease. ferrum-edge's `latest` tag is
          # marked prerelease, so the indirect path returns 404.
          URL="https://github.com/ferrum-edge/ferrum-edge/releases/download/${VERSION}/ferrum-edge-linux-x86_64"
          curl -fsSL "$URL" -o /usr/local/bin/ferrum-edge
          chmod +x /usr/local/bin/ferrum-edge

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install gitforgeops
        run: cargo install --path .

      - name: Validate
        run: gitforgeops validate --format github-annotations
        env:
          FERRUM_OVERLAY: ${{ vars.FERRUM_OVERLAY }}
          FERRUM_NAMESPACE: ${{ vars.FERRUM_NAMESPACE }}
