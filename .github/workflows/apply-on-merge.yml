name: GitForgeOps Apply

on:
  push:
    branches: [main]
    paths:
      - 'resources/**'
      - 'overlays/**'
      - '.gitforgeops/**'

# `apply` commits state updates (and, in file mode, the assembled placeholder
# YAML) back to main, and queries the GitHub API to resolve the PR that
# produced this merge (for policy-override lookups).
permissions:
  contents: write
  pull-requests: read

jobs:
  list-envs:
    runs-on: ubuntu-latest
    outputs:
      envs: ${{ steps.list.outputs.envs }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build gitforgeops
        run: cargo install --path . --locked

      - name: Enumerate environments
        id: list
        run: |
          envs=$(gitforgeops envs --format json)
          echo "envs=$envs" >> "$GITHUB_OUTPUT"

  apply:
    needs: list-envs
    if: needs.list-envs.outputs.envs != '[]' && needs.list-envs.outputs.envs != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJson(needs.list-envs.outputs.envs) }}
    environment: ${{ matrix.environment }}
    concurrency:
      group: ferrum-apply-${{ matrix.environment }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Download ferrum-edge binary
        run: |
          VERSION="${{ vars.FERRUM_EDGE_VERSION || 'latest' }}"
          # Use the direct-tag URL (`/releases/download/<tag>/`) rather
          # than `/releases/latest/download/`, which only resolves to the
          # most recent non-prerelease. ferrum-edge's `latest` tag is
          # marked prerelease, so the indirect path returns 404.
          URL="https://github.com/ferrum-edge/ferrum-edge/releases/download/${VERSION}/ferrum-edge-linux-x86_64"
          curl -fsSL "$URL" -o /usr/local/bin/ferrum-edge
          chmod +x /usr/local/bin/ferrum-edge

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install gitforgeops
        run: cargo install --path . --locked

      - name: Load credential bundles
        id: load-bundles
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
        run: |
          # Collect any FERRUM_CREDS_BUNDLE* secrets into a single JSON object and
          # make it available to the binary. GitHub masks all referenced secrets
          # in logs, so echoing the JSON here is mask-safe by the time it reaches
          # stdout; but we still write it directly to the env file.
          python3 - <<'PY' >> "$GITHUB_ENV"
          import json, os
          raw = os.environ.get("ALL_SECRETS", "{}")
          try:
              data = json.loads(raw)
          except json.JSONDecodeError:
              data = {}
          bundles = {k: v for k, v in data.items() if k.startswith("FERRUM_CREDS_BUNDLE")}
          payload = json.dumps(bundles)
          # Multi-line env var with the EOF marker convention.
          print("FERRUM_CREDS_JSON<<__FERRUM_EOF__")
          print(payload)
          print("__FERRUM_EOF__")
          PY

      - name: Validate
        env:
          FERRUM_ENV: ${{ matrix.environment }}
        run: gitforgeops validate

      # Map the merge commit back to the PR that produced it. The binary uses
      # this to check policy-override labels on the PR; without it, an override
      # approved at PR time wouldn't be honored on the post-merge apply.
      - name: Derive PR number from merge commit
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr=$(gh api "/repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" --jq '.[0].number // ""')
          echo "number=$pr" >> "$GITHUB_OUTPUT"

      - name: Apply
        if: vars.FERRUM_GATEWAY_MODE != 'file'
        env:
          FERRUM_ENV: ${{ matrix.environment }}
          FERRUM_GATEWAY_URL: ${{ secrets.FERRUM_GATEWAY_URL }}
          FERRUM_ADMIN_JWT_SECRET: ${{ secrets.FERRUM_ADMIN_JWT_SECRET }}
          FERRUM_GATEWAY_CA_CERT: ${{ secrets.FERRUM_GATEWAY_CA_CERT }}
          FERRUM_GATEWAY_CLIENT_CERT: ${{ secrets.FERRUM_GATEWAY_CLIENT_CERT }}
          FERRUM_GATEWAY_CLIENT_KEY: ${{ secrets.FERRUM_GATEWAY_CLIENT_KEY }}
          FERRUM_GH_PROVISIONER_TOKEN: ${{ secrets.FERRUM_GH_PROVISIONER_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITFORGEOPS_ACTOR: ${{ github.actor }}
          GITFORGEOPS_PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: gitforgeops apply --auto-approve

      # File mode: assemble a flat YAML preserving `${gh-env-secret:...}`
      # placeholders. This is safe to commit — no credentials are resolved.
      # To get a fully-populated file (for gateways that consume it), admins
      # run the `materialize-file.yml` workflow, which produces an age-
      # encrypted artifact delivered to the admin's SSH key.
      - name: Assemble placeholder file (file mode)
        if: vars.FERRUM_GATEWAY_MODE == 'file'
        env:
          FERRUM_ENV: ${{ matrix.environment }}
        run: gitforgeops export --output assembled/${{ matrix.environment }}.yaml

      - name: Commit state + assembled (if changed)
        # Persisting state is load-bearing: shared-mode diffs, credential shard
        # counts, and rotation metadata all live in .state/<env>.json. A silent
        # push failure would leave the next run reading stale state while
        # reporting success, so we fail the job if we can't push.
        #
        # When the matrix runs multiple envs in parallel and they all try to
        # push to main, contention is normal — retry with rebase on rejection.
        run: |
          set -euo pipefail
          git config user.name "gitforgeops[bot]"
          git config user.email "gitforgeops[bot]@users.noreply.github.com"

          # Stage only the paths this job owns so we don't accidentally pick up
          # anything else that landed in the workdir.
          mkdir -p .state assembled
          git add ".state/${{ matrix.environment }}.json" 2>/dev/null || true
          git add "assembled/${{ matrix.environment }}.yaml" 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi

          git commit -m "chore(gitforgeops): state update for ${{ matrix.environment }} [skip ci]"

          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed state on attempt $attempt."
              exit 0
            fi
            echo "Push rejected on attempt $attempt; fetching + rebasing..."
            git fetch origin main
            # Rebase preserves the single state commit on top of whatever
            # other envs pushed in the meantime. Each env's state file is
            # independent so there's no real conflict to resolve — but abort
            # cleanly if one somehow surfaces.
            git rebase origin/main || { git rebase --abort; echo "Rebase failed" >&2; exit 1; }
            sleep $((attempt * 2))
          done

          echo "ERROR: failed to push state for ${{ matrix.environment }} after 5 attempts" >&2
          exit 1
